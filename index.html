<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Submission Summary Lookup</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    h2 {
      margin-top: 28px;
      font-size: 20px;
    }

    h3 {
      margin-top: 22px;
      font-size: 17px;
    }

    .note, .legend, .guidance {
      background: #eef4ff;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #1a73e8;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #155fc0;
    }

    .error {
      margin-top: 18px;
      background: #fff1f0;
      color: #9f1d1d;
      padding: 14px;
      border-radius: 10px;
    }

    .student-card {
      background: #f9fafc;
      border-radius: 14px;
      padding: 16px;
      margin-top: 24px;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 14px;
    }

    .stat {
      background: #f1f3f7;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }

    .stat .num {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    .stat .label {
      font-size: 13px;
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f3f4f6;
    }

    .pill {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .p {
      background: #dcfae6;
      color: #067647;
    }

    .f {
      background: #eef2f6;
      color: #344054;
    }

    .late {
      background: #ffe4e1;
      color: #b42318;
    }

    .not {
      background: #fff4cc;
      color: #9a6700;
    }

    .remark-ok {
      color: #067647;
      font-weight: bold;
    }

    .remark-note {
      color: #9a6700;
      font-weight: bold;
    }

    .remark-concern {
      color: #b42318;
      font-weight: bold;
    }

    .details-box {
      margin-top: 12px;
      background: #fafafa;
      padding: 14px;
      border-radius: 12px;
      white-space: pre-line;
      line-height: 1.5;
    }

    .email-box {
      margin-top: 20px;
      padding: 14px;
      background: #f3f8f4;
      border-radius: 12px;
      line-height: 1.5;
    }

    .email-box a {
      color: #0b6b37;
      font-weight: bold;
      text-decoration: none;
    }

    .metric-help {
      color: #555;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      body {
        padding: 12px;
      }

      .container {
        padding: 20px;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Quiz Submission Summary Lookup</h1>

    <div class="note">
      Please enter your child’s class, register number, and part of their name.
      For privacy, the system will only display a summary if the entered details verify exactly one student.
    </div>

    <label for="classCode">Class</label>
    <select id="classCode">
      <option value="">Select class</option>
      <option value="26J01">26J01</option>
      <option value="26J02">26J02</option>
      <option value="26J03">26J03</option>
      <option value="26J04">26J04</option>
      <option value="26J05">26J05</option>
      <option value="26J06">26J06</option>
    </select>

    <label for="indexNo">Register number</label>
    <input id="indexNo" type="text" placeholder="e.g. 4">

    <label for="nameQuery">Child’s name / part of name</label>
    <input id="nameQuery" type="text" placeholder="e.g. Tan Wei">

    <button onclick="lookup()">Check Submission Summary</button>

    <div id="output"></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxACW33Bem2M6jWPIHh6TiMUp5DjbgRnlTnPd6nikLMKEKEjSQ9s3dzPB7lW7UVwaPtsA/exec';

    function lookup() {
      const output = document.getElementById('output');

      const classCode = document.getElementById('classCode').value;
      const indexNo = document.getElementById('indexNo').value;
      const nameQuery = document.getElementById('nameQuery').value;

      if (!classCode || !indexNo || !nameQuery) {
        output.innerHTML = '<div class="error">Please enter class, register number, and part of your child’s name.</div>';
        return;
      }

      output.innerHTML = '<p>Checking records...</p>';

      const callbackName = 'parentLookupCallback_' + Date.now();

      window[callbackName] = function(data) {
        renderResult(data);
        delete window[callbackName];
        script.remove();
      };

      const params = new URLSearchParams({
        classCode,
        indexNo,
        nameQuery,
        callback: callbackName
      });

      const script = document.createElement('script');
      script.src = API_URL + '?' + params.toString();

      script.onerror = function() {
        output.innerHTML = '<div class="error">Unable to contact the lookup system. Please try again later.</div>';
        delete window[callbackName];
      };

      document.body.appendChild(script);
    }

    function renderResult(data) {
      const output = document.getElementById('output');

      if (!data.ok) {
        output.innerHTML = '<div class="error">' + escapeHtml(data.message) + '</div>';
        return;
      }

      const s = data.summary;
      const student = data.student;
      const teacher = data.teacher;

      const mailSubject = encodeURIComponent(
        'Query regarding quiz submission summary for ' +
        student.name + ' (' + student.classCode + ')'
      );

      const mailBody = encodeURIComponent(
        'Dear ' + teacher.name + ',\n\n' +
        'I would like to enquire about the quiz submission summary for ' +
        student.name + ' from ' + student.classCode + '.\n\n' +
        'Thank you.'
      );

      const mailLink = teacher.email
        ? 'mailto:' + teacher.email + '?subject=' + mailSubject + '&body=' + mailBody
        : '#';

      let html = '';

      html += '<div class="student-card">';
      html += '<h2>' + escapeHtml(student.name) + '</h2>';
      html += '<p><strong>Class:</strong> ' + escapeHtml(student.classCode) + '</p>';
      html += '<p><strong>Register number:</strong> ' + escapeHtml(student.indexNo) + '</p>';
      html += '<p><strong>First concluded lecture quiz:</strong> ' + escapeHtml(data.firstQuizDate || '-') + '</p>';
      html += '<p><strong>Data updated:</strong> ' + escapeHtml(data.lastUpdated || '-') + '</p>';
      html += '</div>';

      html += '<h2>Overall Summary</h2>';
      html += '<div class="grid">';
      html += statBox(s.totalQuizzes, 'Total concluded quizzes');
      html += statBox(s.submittedTotal, 'Submitted');
      html += statBox(s.submittedP, 'Submitted - P');
      html += statBox(s.submittedF, 'Submitted - F');
      html += statBox(s.late, 'Late');
      html += statBox(s.notSubmitted, 'Not Submitted');
      html += statBox(s.completionPercent + '%', 'Completion');
      html += statBox(s.passOutOfTotalPercent + '%', 'Submitted - P out of total');
      html += '</div>';

      html += '<div class="legend">';
      html += '<strong>Status explanation:</strong><br>';
      html += '<strong>Submitted - P:</strong> submitted on time and met the passing mark.<br>';
      html += '<strong>Submitted - F:</strong> submitted on time but did not meet the passing mark.<br>';
      html += '<strong>Late:</strong> submitted after the deadline.<br>';
      html += '<strong>Not Submitted:</strong> no submission recorded.';
      html += '</div>';

      html += '<h2>Comparison with Class and Cohort</h2>';
      html += '<table>';
      html += '<thead><tr><th>Metric</th><th>Your Child</th><th>Class Average</th><th>Cohort Average</th></tr></thead>';
      html += '<tbody>';
      html += compareRow('Completion %', 'how consistently quizzes are attempted', s.completionPercent, s.classCompletionPercent, s.cohortCompletionPercent);
      html += compareRow('On-time submission %', 'how well the student keeps pace with quiz deadlines', s.onTimePercent, s.classOnTimePercent, s.cohortOnTimePercent);
      html += compareRow('Submitted - P out of total %', 'how often the student meets the passing mark across all concluded quizzes', s.passOutOfTotalPercent, s.classPassOutOfTotalPercent, s.cohortPassOutOfTotalPercent);
      html += '</tbody></table>';

      html += '<h2>Most Recent 10 Quizzes</h2>';
      html += '<table>';
      html += '<thead><tr><th>Date / Deadline</th><th>Submitted At</th><th>Quiz</th><th>Topic</th><th>Status</th><th>Late Duration</th></tr></thead>';
      html += '<tbody>';

      if (data.recent10 && data.recent10.length) {
        data.recent10.forEach(item => {
          html += '<tr>';
          html += '<td>' + escapeHtml(item.deadline || '-') + '</td>';
          html += '<td>' + escapeHtml(item.submittedAt || '-') + '</td>';
          html += '<td>' + escapeHtml(item.quiz || item.aflId || '-') + '<br><small>' + escapeHtml(item.aflId || '') + '</small></td>';
          html += '<td>' + escapeHtml(item.topic || '-') + '</td>';
          html += '<td>' + statusPill(item.outcome) + '</td>';
          html += '<td>' + escapeHtml(item.lateDuration || '-') + '</td>';
          html += '</tr>';
        });
      } else {
        html += '<tr><td colspan="6">No concluded quizzes available yet.</td></tr>';
      }

      html += '</tbody></table>';

      html += '<h2>Topic Breakdown</h2>';
      html += '<table>';
      html += '<thead><tr><th>Topic</th><th>Total</th><th>Submitted - P</th><th>Cohort Submitted - P %</th><th>Remarks</th></tr></thead>';
      html += '<tbody>';

      if (data.topicBreakdown && data.topicBreakdown.length) {
        data.topicBreakdown.forEach(t => {
          html += '<tr>';
          html += '<td>' + escapeHtml(t.topic || '-') + '</td>';
          html += '<td>' + escapeHtml(t.total || '0') + '</td>';
          html += '<td>' + escapeHtml(t.submittedP || '0') + ' (' + escapeHtml(t.submittedPPercent || '0') + '%)</td>';
          html += '<td>' + escapeHtml(t.cohortSubmittedPPercent || '0') + '%</td>';
          html += '<td class="' + remarkClass(t.remarkLevel) + '">' + escapeHtml(t.remarks || '-') + '</td>';
          html += '</tr>';
        });
      } else {
        html += '<tr><td colspan="5">No topic data available yet.</td></tr>';
      }

      html += '</tbody></table>';

      html += '<h2>Action Required</h2>';

      html += '<h3>Late submissions</h3>';
      html += '<div class="details-box">' + escapeHtml(data.details.lateQuizDetails || 'None') + '</div>';

      html += '<h3>Not submitted</h3>';
      html += '<div class="details-box">' + escapeHtml(data.details.notSubmittedQuizDetails || 'None') + '</div>';

      html += '<h2>Parent Guidance</h2>';
      html += '<div class="guidance">';
      html += escapeHtml(data.parentGuidance || 'Please check in with your child on recent lecture quiz completion and revision.');
      html += '</div>';

      html += '<div class="email-box">';
      html += '<p><strong>Further questions?</strong></p>';
      html += '<p>You may email the Biology teacher-in-charge for your child’s class:</p>';
      html += '<p>' + escapeHtml(teacher.name || 'Biology teacher') + '</p>';

      if (teacher.email) {
        html += '<p><a href="' + mailLink + '">' + escapeHtml(teacher.email) + '</a></p>';
      }

      html += '</div>';

      output.innerHTML = html;
    }

    function compareRow(label, helpText, child, classAvg, cohortAvg) {
      return '<tr><td>' +
        escapeHtml(label) +
        '<br><span class="metric-help">(' + escapeHtml(helpText) + ')</span></td><td>' +
        escapeHtml(child || '0') + '%</td><td>' +
        escapeHtml(classAvg || '0') + '%</td><td>' +
        escapeHtml(cohortAvg || '0') + '%</td></tr>';
    }

    function statBox(num, label) {
      return '<div class="stat"><div class="num">' + escapeHtml(String(num)) +
             '</div><div class="label">' + escapeHtml(label) + '</div></div>';
    }

    function statusPill(status) {
      let cls = '';

      if (status === 'Submitted - P') cls = 'p';
      else if (status === 'Submitted - F') cls = 'f';
      else if (status === 'Late') cls = 'late';
      else if (status === 'Not Submitted') cls = 'not';

      return '<span class="pill ' + cls + '">' + escapeHtml(status || '-') + '</span>';
    }

    function remarkClass(level) {
      if (level === 'concern') return 'remark-concern';
      if (level === 'note') return 'remark-note';
      return 'remark-ok';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
